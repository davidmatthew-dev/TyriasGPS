name: Auto Create PR

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            echo "PR #$existing already exists, skipping"
            exit 0
          fi

          ahead_by=$(gh api repos/${{ github.repository }}/compare/main...dev --jq '.ahead_by')
          if [ "$ahead_by" = "0" ]; then
            echo "No commits between main and dev, skipping"
            exit 0
          fi

          gh pr create --base main --head dev \
            --title "Merge dev to main" \
            --body "Automated PR from dev branch push"
