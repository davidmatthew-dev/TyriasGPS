name: Auto Approve PR

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve:
    if: github.event.review.user.login == 'davidmatthew-dev' && github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge --auto \
            --repo ${{ github.repository }}
