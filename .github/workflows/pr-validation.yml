name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branch-up-to-date:
    name: Branch Up To Date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PR includes latest base branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}"
          BASE_SHA="$(git rev-parse "origin/${{ github.base_ref }}")"
          MERGE_BASE="$(git merge-base HEAD "origin/${{ github.base_ref }}")"

          if [ "$MERGE_BASE" != "$BASE_SHA" ]; then
            echo "PR branch is behind ${{ github.base_ref }}."
            echo "Please update your branch before merging."
            exit 1
          fi

  build-module:
    name: Build Module
    runs-on: windows-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/ItzFeral.TyriasGPS.csproj

      - name: Build
        run: dotnet build src/ItzFeral.TyriasGPS.csproj -c Release --no-restore /p:BlishHUDCopyLanguageFolders=false